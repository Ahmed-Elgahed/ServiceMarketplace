services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - ../backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always

  backend:
    build: ../backend
    container_name: django_backend
    command: >
      gunicorn backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
    volumes:
      - ../backend:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db
      - redis
    env_file:
      - ../backend/.env
    restart: always

  celery:
    build: ../backend
    container_name: celery_worker
    command: celery -A backend worker --loglevel=info
    volumes:
      - ../backend:/app
    depends_on:
      - redis
      - db
    env_file:
      - ../backend/.env
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  postgres_data:
  static_volume: